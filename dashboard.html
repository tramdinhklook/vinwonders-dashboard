  .my-sel { font-size:11px; border:1px solid #e2e8f0; border-radius:5px; padding:2px 4px; background:#fff; cursor:pointer; outline:none; max-width:100px; }
  .my-sel:focus { border-color:#94a3b8; }
  .my-sel[data-v="onboarding"] { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; font-weight:600; }
  .my-sel[data-v="solved"]     { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; font-weight:600; }

// ── MY ACTION (localStorage) ─────────────────────────────────────────────────

const LS_KEY = 'vw_my_action';
function loadMyActions() { try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch(e){ return {}; } }
function getMyAction(pidKey) { return loadMyActions()[pidKey]||''; }
function setMyAction(pidKey, sel) {
  const data = loadMyActions();
  data[pidKey] = sel.value;
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  sel.setAttribute('data-v', sel.value);
  // restyle without full re-render
  sel.className = 'my-sel';
}

// ── HELPERS ──────────────────────────────────────────────────────────────────

function b(status, text) {
  const map = {
    published:  ['bp', text||'✅ Published'],
    unpublished:['bu', text||'🟡 Unpublished'],
    missing:    ['bm', text||'🔴 Missing'],
    exists:     ['be', text||'✅ On Klook'],
  };
  const [cls, lbl] = map[status] || ['bg-gray-100 text-gray-600', status];
  return `<span class="px-1.5 py-0.5 rounded text-xs font-semibold ${cls}">${lbl}</span>`;
}

function pidIcon(s) {
  return s==='exists' ? '✅' : s==='unpublished' ? '🟡' : '🔴';
}

// ── STATS ────────────────────────────────────────────────────────────────────

function calcStats() {
  let totA=0, pubA=0, unpA=0, misA=0, totP=0, okP=0, unpP=0, misP=0;
  CITIES.forEach(c=>c.aids.forEach(a=>{
    totA++;
    if(a.status==='published') pubA++;
    else if(a.status==='unpublished') unpA++;
    else misA++;
    a.pids.forEach(p=>{ totP++; if(p.status==='exists') okP++; else if(p.status==='unpublished') unpP++; else misP++; });
  }));
  return {totA,pubA,unpA,misA,totP,okP,unpP,misP};
}

function renderKPIs() {
  const s = calcStats();
  const cards = [
    {label:'AIDs Total',     v:s.totA, sub:'Activities',     icon:'📋', cl:'bg-slate-50  border-slate-100'},
    {label:'Published',      v:s.pubA, sub:'Live on Klook',  icon:'✅', cl:'bg-green-50  border-green-100'},
    {label:'Unpublished',    v:s.unpA, sub:'Offline',        icon:'🟡', cl:'bg-yellow-50 border-yellow-100'},
    {label:'Missing AIDs',   v:s.misA, sub:'No AID',         icon:'🔴', cl:'bg-red-50    border-red-100'},
    {label:'Missing PIDs',   v:s.misP, sub:'Pkgs not live',  icon:'📦', cl:'bg-orange-50 border-orange-100'},
  ];
  document.getElementById('kpis').innerHTML = cards.map(c=>
    `<div class="rounded-lg border ${c.cl} px-3 py-2.5">
      <div class="flex items-center justify-between">
        <span class="text-xl leading-none">${c.icon}</span>
        <span class="text-2xl font-bold text-gray-900">${c.v}</span>
      </div>
      <div class="text-xs font-semibold text-gray-700 mt-1.5">${c.label}</div>
      <div class="text-xs text-gray-400">${c.sub}</div>
    </div>`
  ).join('');
}

// ── FILTERS ──────────────────────────────────────────────────────────────────

let fStatus='all', fCity='all';

function renderFilters() {
  const sOpts=[{k:'all',l:'All'},{k:'missing',l:'🔴 Missing'},{k:'unpublished',l:'🟡 Unpub.'},{k:'published',l:'✅ Published'}];
  const cOpts=[{k:'all',l:'All Cities'},...CITIES.map(c=>({k:c.city,l:c.city}))];
  document.getElementById('filters').innerHTML = [
    ...sOpts.map(o=>btn(o.k,o.l, fStatus===o.k)),
    `<span class="text-gray-300 text-xs">|</span>`,
    ...cOpts.map(o=>btn(o.k,o.l, fCity===o.k)),
  ].join('');
}

function btn(k,l,active) {
  return `<button onclick="setF('${k}')" class="px-2 py-0.5 text-xs rounded-full border font-medium transition-all ${active?'bg-gray-900 text-white border-gray-900':'bg-white border-gray-200 hover:bg-gray-50 text-gray-600'}">${l}</button>`;
}

function setF(k) {
  const sKeys=['all','missing','unpublished','published'];
  const cKeys=['all',...CITIES.map(c=>c.city)];
  if(sKeys.includes(k)) fStatus=k;
  else if(cKeys.includes(k)) fCity=k;
  renderFilters(); render();
}

// ── TREE ─────────────────────────────────────────────────────────────────────

const openAIDs = new Set();
const openPIDs = new Set();

function toggleAID(k) { openAIDs.has(k)?openAIDs.delete(k):openAIDs.add(k); render(); }
function togglePID(k) { openPIDs.has(k)?openPIDs.delete(k):openPIDs.add(k); render(); }

function expandAll() {
  CITIES.forEach(c=>c.aids.forEach((a,ai)=>{
    const k=c.city+ai; openAIDs.add(k);
    a.pids.forEach((_,pi)=>openPIDs.add(k+pi));
  })); render();
}
function collapseAll() { openAIDs.clear(); openPIDs.clear(); render(); }

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  let html='';

  for(const city of CITIES) {
    if(fCity!=='all' && fCity!==city.city) continue;

    const visAIDs = city.aids.filter(a=>{
      const ms = fStatus==='all' || a.status===fStatus ||
        (fStatus==='missing' && a.pids.some(p=>p.status==='missing')) ||
        (fStatus==='unpublished' && a.pids.some(p=>p.status==='unpublished'));
      const mq = !q || a.name.toLowerCase().includes(q) ||
        a.pids.some(p=>p.name.toLowerCase().includes(q)||(p.rc||'').toLowerCase().includes(q));
      return ms && mq;
    });
    if(!visAIDs.length) continue;

    // city bar
    const missPIDs = visAIDs.reduce((n,a)=>n+a.pids.filter(p=>p.status!=='exists').length,0);
    html+=`<div class="rounded-xl overflow-hidden border border-slate-200 shadow-sm">
      <div class="city-bar px-4 py-2 flex items-center gap-2">
        <span class="font-bold text-sm">📍 ${city.city}</span>
        <span class="ml-auto text-xs text-slate-400">${visAIDs.length} AID${visAIDs.length!==1?'s':''}</span>
        ${missPIDs?`<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-red-500 text-white">${missPIDs} missing</span>`:''}
      </div>`;

    for(let ai=0;ai<visAIDs.length;ai++){
      const a=visAIDs[ai];
      const aidKey=city.city+city.aids.indexOf(a);
      const isOpen=openAIDs.has(aidKey);
      const missPID=a.pids.filter(p=>p.status!=='exists').length;
      const lastAID=ai===visAIDs.length-1;

      html+=`<div class="aid-border-${a.status} ${lastAID&&!isOpen?'':'border-b border-gray-100'}">
        <div class="aid-row flex items-center gap-2 px-3 py-2" onclick="toggleAID('${aidKey}')">
          <span class="text-gray-300 w-3 text-center text-xs">${isOpen?'▾':'▸'}</span>
          <span class="text-sm">🎢</span>
          <span class="font-medium text-gray-900 flex-1 min-w-0">
            ${a.aid?`<a href="${KLOOK}${a.aid}/" target="_blank" class="klk" onclick="event.stopPropagation()">${a.aid}</a> – `:''}${a.name}
          </span>
          <span class="text-xs text-gray-400 hidden md:block">${a.merchant}</span>
          ${b(a.status)}
          ${missPID?`<span class="px-1.5 py-0.5 rounded text-xs font-semibold bm">${missPID} pkg missing</span>`:''}
          <span class="text-xs text-gray-300">${a.pids.length}p</span>
        </div>`;

      if(isOpen) {
        html+=`<div class="border-t border-gray-100">
          <table class="w-full text-xs pid-table">
            <thead><tr class="bg-gray-50 text-gray-500">
              <th class="text-left pl-8 pr-2 py-1.5 font-medium w-5">Status</th>
              <th class="text-left px-2 py-1.5 font-medium">Package Name</th>
              <th class="text-left px-2 py-1.5 font-medium hidden md:table-cell">Type</th>
              <th class="text-left px-2 py-1.5 font-medium hidden md:table-cell">VW Rate Code</th>
              <th class="text-left px-2 py-1.5 font-medium hidden lg:table-cell">Discount</th>
              <th class="text-left px-2 py-1.5 font-medium">My Action</th>
              <th class="text-left px-2 py-1.5 font-medium w-6"></th>
            </tr></thead>
            <tbody>`;

        for(let pi=0;pi<a.pids.length;pi++){
          const p=a.pids[pi];
          const pidKey=aidKey+pi;
          const isPidOpen=openPIDs.has(pidKey);

          const myVal = getMyAction(pidKey);
          html+=`<tr class="border-t border-gray-50 cursor-pointer" onclick="togglePID('${pidKey}')">
            <td class="pl-8 pr-2 py-1.5">${pidIcon(p.status)}</td>
            <td class="px-2 py-1.5 font-medium text-gray-800">${p.name}
              ${p.note?`<span class="ml-1 text-gray-400 font-normal hidden lg:inline">— ${p.note}</span>`:''}
            </td>
            <td class="px-2 py-1.5 text-gray-500 hidden md:table-cell">
              <span class="px-1.5 py-0.5 bg-blue-50 text-blue-700 rounded">${p.type}</span>
            </td>
            <td class="px-2 py-1.5 font-mono text-gray-400 hidden md:table-cell">${p.rc}</td>
            <td class="px-2 py-1.5 text-gray-500 hidden lg:table-cell">${p.disc!=='-'?p.disc:'–'}</td>
            <td class="px-2 py-1.5" onclick="event.stopPropagation()">
              <select class="my-sel" data-v="${myVal}" onchange="setMyAction('${pidKey}',this)">
                <option value="" ${myVal===''?'selected':''}>—</option>
                <option value="onboarding" ${myVal==='onboarding'?'selected':''}>🔄 Onboarding</option>
                <option value="solved"     ${myVal==='solved'?'selected':''}>✅ Solved</option>
                <option value="skip"       ${myVal==='skip'?'selected':''}>⏭ Skip</option>
              </select>
            </td>
            <td class="px-2 py-1.5 text-gray-300 text-center">${isPidOpen?'▾':'▸'}</td>
          </tr>`;

          if(isPidOpen){
            html+=`<tr class="bg-slate-50"><td colspan="7" class="pl-14 pr-4 py-2">
              ${p.note?`<div class="text-xs text-amber-700 mb-1.5">ℹ️ ${p.note}</div>`:''}
              <div class="text-xs text-gray-400 mb-1 font-medium">SKUs</div>
              <div>${p.skus.map(s=>`<span class="sku-chip">🎫 ${s}</span>`).join('')}</div>
            </td></tr>`;
          }
        }

        html+=`</tbody></table></div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  document.getElementById('tree').innerHTML = html||'<div class="text-center text-gray-400 py-10 text-sm">No results.</div>';
}

// ── EXPORT ───────────────────────────────────────────────────────────────────

function exportCSV() {
  const myData = loadMyActions();
  const rows=[['City','AID','AID Name','AID Status','VW Rate Code','Package Name','Type','Discount','PID Status','My Action','SKUs','Note']];
  CITIES.forEach(c=>c.aids.forEach((a,ai)=>a.pids.forEach((p,pi)=>{
    const aidKey=c.city+c.aids.indexOf(a);
    const pidKey=aidKey+pi;
    rows.push([c.city,a.aid||'',a.name,a.status,p.rc,p.name,p.type,p.disc,p.status,myData[pidKey]||'',p.skus.join(' | '),p.note||'']);
  })));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const el=document.createElement('a');
  el.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  el.download='vinwonders_klook_'+new Date().toISOString().slice(0,10)+'.csv';
  el.click();
}
